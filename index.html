<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VIGO · CONTROL CENTER</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@300;400;600;700&family=Orbitron:wght@400;700;900&display=swap');

  :root {
    --bg: #020508;
    --bg2: #050d12;
    --panel: #060f16;
    --border: #0a2030;
    --accent: #00e5ff;
    --accent2: #00ff88;
    --warn: #ff6b00;
    --danger: #ff2244;
    --dim: #1a3040;
    --text: #a0c8d8;
    --text-bright: #d0eaf5;
    --grid-line: rgba(0, 229, 255, 0.04);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { background: var(--bg); color: var(--text); font-family: 'Rajdhani', sans-serif; min-height: 100%; overflow-x: hidden; }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: linear-gradient(var(--grid-line) 1px, transparent 1px), linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none; z-index: 0;
  }

  body::after {
    content: '';
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,229,255,0.008) 2px, rgba(0,229,255,0.008) 4px);
    pointer-events: none; z-index: 999;
  }

  /* HEADER */
  header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(2,5,8,0.97);
    border-bottom: 1px solid var(--border);
    backdrop-filter: blur(12px);
    padding: 0 24px;
    display: flex; align-items: center; justify-content: space-between;
    height: 64px;
  }

  .logo { display: flex; align-items: center; gap: 14px; }

  .logo-icon {
    width: 38px; height: 38px;
    border: 1.5px solid var(--accent); border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    position: relative;
    box-shadow: 0 0 14px rgba(0,229,255,0.25), inset 0 0 10px rgba(0,229,255,0.05);
  }
  .logo-icon::before {
    content: '';
    width: 16px; height: 11px;
    border: 1.5px solid var(--accent); border-radius: 2px; position: absolute;
  }
  .logo-icon::after {
    content: ''; width: 5px; height: 5px;
    background: var(--accent); border-radius: 50%;
    position: absolute; top: 6px; right: 6px;
    box-shadow: 0 0 6px var(--accent);
    animation: blink 2s ease-in-out infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.15} }

  .logo-text h1 { font-family:'Orbitron',monospace; font-size:14px; font-weight:700; letter-spacing:0.18em; color:var(--text-bright); line-height:1; }
  .logo-text span { font-family:'Share Tech Mono',monospace; font-size:10px; color:var(--accent); letter-spacing:0.25em; opacity:0.7; }

  .header-mid { display:flex; align-items:center; gap:24px; }

  #clock { font-family:'Orbitron',monospace; font-size:20px; font-weight:700; color:var(--accent); letter-spacing:0.1em; text-shadow:0 0 20px rgba(0,229,255,0.4); }

  .status-pills { display:flex; gap:12px; }
  .pill { display:flex; align-items:center; gap:5px; font-family:'Share Tech Mono',monospace; font-size:10px; color:var(--text); background:rgba(0,229,255,0.04); border:1px solid var(--border); padding:4px 10px; border-radius:2px; }
  .pill .dot { width:5px; height:5px; border-radius:50%; background:var(--accent2); box-shadow:0 0 5px var(--accent2); animation:blink 1.8s ease-in-out infinite; }

  .header-right { display:flex; gap:8px; }
  .btn { font-family:'Rajdhani',sans-serif; font-weight:600; font-size:12px; letter-spacing:0.1em; text-transform:uppercase; padding:7px 16px; border:1px solid var(--border); background:transparent; color:var(--text); cursor:pointer; transition:all 0.2s; border-radius:3px; }
  .btn:hover { border-color:var(--accent); color:var(--accent); background:rgba(0,229,255,0.06); box-shadow:0 0 12px rgba(0,229,255,0.15); }
  .btn.active { border-color:var(--accent); color:var(--accent); background:rgba(0,229,255,0.1); }

  /* TOOLBAR */
  .toolbar {
    position: sticky; top: 64px; z-index: 90;
    background: rgba(5,13,18,0.98);
    border-bottom: 1px solid var(--border);
    padding: 10px 24px;
    display: flex; align-items: center; gap: 12px;
    backdrop-filter: blur(8px);
  }

  .toolbar-label { font-family:'Share Tech Mono',monospace; font-size:10px; letter-spacing:0.2em; color:var(--accent); opacity:0.5; white-space:nowrap; }

  .search-wrap { position:relative; flex:1; max-width:300px; }
  .search-wrap input { width:100%; background:rgba(0,229,255,0.03); border:1px solid var(--border); border-radius:3px; padding:7px 10px 7px 30px; font-family:'Share Tech Mono',monospace; font-size:12px; color:var(--text-bright); outline:none; transition:border-color 0.2s; }
  .search-wrap input:focus { border-color:var(--accent); }
  .search-wrap input::placeholder { color:var(--dim); }
  .search-icon { position:absolute; left:9px; top:50%; transform:translateY(-50%); color:var(--dim); font-size:13px; pointer-events:none; }

  .count-badge { font-family:'Share Tech Mono',monospace; font-size:11px; color:var(--accent); background:rgba(0,229,255,0.07); border:1px solid rgba(0,229,255,0.2); padding:4px 10px; border-radius:2px; white-space:nowrap; }

  .grid-btns { display:flex; gap:3px; margin-left:auto; }
  .grid-btn { width:28px; height:28px; border:1px solid var(--border); background:transparent; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all 0.15s; border-radius:3px; padding:0; }
  .grid-btn:hover { border-color:var(--accent); background:rgba(0,229,255,0.06); }
  .grid-btn.active { border-color:var(--accent); background:rgba(0,229,255,0.12); }
  .grid-btn svg { width:13px; height:13px; }
  .grid-btn rect { fill:var(--dim); }
  .grid-btn.active rect { fill:var(--accent); }

  /* MAIN */
  main { position:relative; z-index:1; padding:18px 24px 60px; }

  #cam-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; transition:grid-template-columns 0.2s; }
  #cam-grid.g2 { grid-template-columns:repeat(2,1fr); }
  #cam-grid.g3 { grid-template-columns:repeat(3,1fr); }
  #cam-grid.g4 { grid-template-columns:repeat(4,1fr); }
  #cam-grid.g5 { grid-template-columns:repeat(5,1fr); }

  /* CARD */
  .cam-card { background:var(--panel); border:1px solid var(--border); border-radius:4px; overflow:hidden; transition:all 0.2s; animation:fadeIn 0.35s ease both; }
  @keyframes fadeIn { from{opacity:0;transform:scale(0.97)} to{opacity:1;transform:scale(1)} }
  .cam-card:hover { border-color:rgba(0,229,255,0.35); box-shadow:0 0 20px rgba(0,229,255,0.07); transform:translateY(-1px); }

  .cam-header { display:flex; align-items:center; justify-content:space-between; padding:5px 9px; background:rgba(0,229,255,0.03); border-bottom:1px solid var(--border); }
  .cam-id { font-family:'Orbitron',monospace; font-size:8px; color:var(--accent); letter-spacing:0.2em; opacity:0.65; }
  .cam-live { display:flex; align-items:center; gap:4px; font-family:'Share Tech Mono',monospace; font-size:8px; color:var(--accent2); }
  .cam-live .dot { width:4px; height:4px; border-radius:50%; background:var(--accent2); box-shadow:0 0 4px var(--accent2); animation:blink 1.5s ease-in-out infinite; }

  /* Image */
  .cam-img-wrap { position:relative; width:100%; padding-bottom:75%; background:#000; overflow:hidden; cursor:pointer; }
  .cam-img-wrap img { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; display:block; opacity:0; transition:opacity 0.3s; }
  .cam-img-wrap img.loaded { opacity:1; }

  .cam-overlay { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:6px; background:#000; transition:opacity 0.3s; }
  .cam-overlay.hidden { opacity:0; pointer-events:none; }
  .loader { width:24px; height:24px; border:2px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin 0.7s linear infinite; }
  @keyframes spin { to{transform:rotate(360deg)} }
  .cam-overlay span { font-family:'Share Tech Mono',monospace; font-size:8px; color:var(--dim); letter-spacing:0.2em; }

  .cam-ts { position:absolute; bottom:5px; right:7px; font-family:'Share Tech Mono',monospace; font-size:8px; color:rgba(0,229,255,0.55); background:rgba(0,0,0,0.65); padding:2px 4px; border-radius:2px; pointer-events:none; }

  /* Corner decorations on hover */
  .cam-corners { position:absolute; inset:0; pointer-events:none; }
  .cam-corners::before, .cam-corners::after { content:''; position:absolute; width:10px; height:10px; border-color:var(--accent); border-style:solid; opacity:0; transition:opacity 0.2s; }
  .cam-corners::before { top:5px; left:5px; border-width:1.5px 0 0 1.5px; }
  .cam-corners::after  { bottom:5px; right:5px; border-width:0 1.5px 1.5px 0; }
  .cam-card:hover .cam-corners::before, .cam-card:hover .cam-corners::after { opacity:1; }

  /* Footer */
  .cam-footer { display:flex; align-items:center; justify-content:space-between; padding:6px 9px; }
  .cam-name { font-family:'Rajdhani',sans-serif; font-size:11px; font-weight:600; color:var(--text-bright); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; flex:1; margin-right:6px; }
  .cam-btns { display:flex; gap:3px; flex-shrink:0; }
  .cam-btn { width:20px; height:20px; border:1px solid var(--border); background:transparent; cursor:pointer; display:flex; align-items:center; justify-content:center; border-radius:2px; color:var(--dim); font-size:10px; transition:all 0.15s; text-decoration:none; line-height:1; }
  .cam-btn:hover { border-color:var(--accent); color:var(--accent); background:rgba(0,229,255,0.08); }

  /* NO RESULTS */
  .empty { grid-column:1/-1; text-align:center; padding:80px 0; font-family:'Share Tech Mono',monospace; font-size:13px; color:var(--dim); letter-spacing:0.2em; }

  /* MODAL */
  .modal-bg { position:fixed; inset:0; background:rgba(0,0,0,0.93); z-index:1000; display:flex; align-items:center; justify-content:center; opacity:0; pointer-events:none; transition:opacity 0.2s; backdrop-filter:blur(6px); }
  .modal-bg.open { opacity:1; pointer-events:all; }

  .modal { background:var(--panel); border:1px solid var(--accent); border-radius:6px; width:min(92vw,960px); overflow:hidden; box-shadow:0 0 60px rgba(0,229,255,0.12); transform:scale(0.94); transition:transform 0.2s; display:flex; flex-direction:column; max-height:92vh; }
  .modal-bg.open .modal { transform:scale(1); }

  .modal-top { display:flex; align-items:center; justify-content:space-between; padding:11px 18px; background:rgba(0,229,255,0.05); border-bottom:1px solid var(--border); flex-shrink:0; }
  .modal-title { font-family:'Orbitron',monospace; font-size:12px; color:var(--accent); letter-spacing:0.15em; }
  .modal-close { width:26px; height:26px; border:1px solid var(--border); background:transparent; cursor:pointer; color:var(--text); font-size:15px; border-radius:3px; display:flex; align-items:center; justify-content:center; transition:all 0.15s; }
  .modal-close:hover { border-color:var(--danger); color:var(--danger); }

  .modal-img-wrap { position:relative; flex:1; background:#000; min-height:200px; overflow:hidden; display:flex; align-items:center; justify-content:center; }
  #modal-img { max-width:100%; max-height:65vh; object-fit:contain; display:block; }
  .modal-loading { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px; background:#000; }
  .modal-loading.hidden { display:none; }
  .modal-loading span { font-family:'Share Tech Mono',monospace; font-size:10px; color:var(--dim); letter-spacing:0.2em; }

  .modal-bottom { display:flex; align-items:center; justify-content:space-between; padding:12px 18px; border-top:1px solid var(--border); flex-shrink:0; gap:12px; flex-wrap:wrap; }
  .modal-info { flex:1; min-width:0; }
  .modal-cam-name { font-family:'Rajdhani',sans-serif; font-size:17px; font-weight:700; color:var(--text-bright); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .modal-meta { font-family:'Share Tech Mono',monospace; font-size:10px; color:var(--text); display:flex; gap:14px; margin-top:3px; flex-wrap:wrap; }
  .modal-meta b { color:var(--accent); font-weight:normal; }
  .modal-nav { display:flex; gap:6px; }
  .nav-btn { padding:7px 18px; border:1px solid var(--border); background:transparent; color:var(--text); cursor:pointer; font-family:'Rajdhani',sans-serif; font-size:13px; font-weight:600; letter-spacing:0.1em; border-radius:3px; transition:all 0.15s; }
  .nav-btn:hover { border-color:var(--accent); color:var(--accent); background:rgba(0,229,255,0.06); }
  .modal-refresh { padding:7px 14px; border:1px solid var(--border); background:transparent; color:var(--text); cursor:pointer; font-family:'Share Tech Mono',monospace; font-size:11px; border-radius:3px; transition:all 0.15s; }
  .modal-refresh:hover { border-color:var(--accent2); color:var(--accent2); }

  ::-webkit-scrollbar { width:4px; }
  ::-webkit-scrollbar-track { background:var(--bg); }
  ::-webkit-scrollbar-thumb { background:var(--border); }

  @media (max-width:700px) {
    header { padding:0 12px; }
    .header-mid, .status-pills { display:none; }
    .toolbar { padding:8px 12px; }
    main { padding:10px 12px 40px; }
    #cam-grid { grid-template-columns:repeat(2,1fr) !important; gap:7px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon"></div>
    <div class="logo-text">
      <h1>VIGO CCTV</h1>
      <span>CONTROL CENTER</span>
    </div>
  </div>
  <div class="header-mid">
    <div id="clock">--:--:--</div>
    <div class="status-pills">
      <div class="pill"><div class="dot"></div> FEED ACTIVO</div>
      <div class="pill"><div class="dot"></div> <span id="total-count">55</span> CÁMARAS</div>
    </div>
  </div>
  <div class="header-right">
    <button class="btn" onclick="refreshAll()">↻ REFRESH</button>
    <button class="btn" id="auto-btn" onclick="toggleAuto()">AUTO OFF</button>
  </div>
</header>

<div class="toolbar">
  <span class="toolbar-label">BUSCAR</span>
  <div class="search-wrap">
    <span class="search-icon">⌕</span>
    <input type="text" id="search" placeholder="Nombre o ID de cámara..." oninput="filterCams()">
  </div>
  <div class="count-badge" id="count-badge">55 / 55</div>
  <div class="grid-btns">
    <button class="grid-btn" onclick="setGrid(2)" title="2 col" id="gb2">
      <svg viewBox="0 0 12 12"><rect x="0" y="0" width="5" height="5" rx="1"/><rect x="7" y="0" width="5" height="5" rx="1"/><rect x="0" y="7" width="5" height="5" rx="1"/><rect x="7" y="7" width="5" height="5" rx="1"/></svg>
    </button>
    <button class="grid-btn active" onclick="setGrid(3)" title="3 col" id="gb3">
      <svg viewBox="0 0 12 12"><rect x="0" y="0" width="3" height="3" rx="0.5"/><rect x="4.5" y="0" width="3" height="3" rx="0.5"/><rect x="9" y="0" width="3" height="3" rx="0.5"/><rect x="0" y="4.5" width="3" height="3" rx="0.5"/><rect x="4.5" y="4.5" width="3" height="3" rx="0.5"/><rect x="9" y="4.5" width="3" height="3" rx="0.5"/><rect x="0" y="9" width="3" height="3" rx="0.5"/><rect x="4.5" y="9" width="3" height="3" rx="0.5"/><rect x="9" y="9" width="3" height="3" rx="0.5"/></svg>
    </button>
    <button class="grid-btn" onclick="setGrid(4)" title="4 col" id="gb4">
      <svg viewBox="0 0 12 12"><rect x="0" y="0" width="2.2" height="2.2" rx="0.3"/><rect x="3.27" y="0" width="2.2" height="2.2" rx="0.3"/><rect x="6.53" y="0" width="2.2" height="2.2" rx="0.3"/><rect x="9.8" y="0" width="2.2" height="2.2" rx="0.3"/><rect x="0" y="3.27" width="2.2" height="2.2" rx="0.3"/><rect x="3.27" y="3.27" width="2.2" height="2.2" rx="0.3"/><rect x="6.53" y="3.27" width="2.2" height="2.2" rx="0.3"/><rect x="9.8" y="3.27" width="2.2" height="2.2" rx="0.3"/><rect x="0" y="6.53" width="2.2" height="2.2" rx="0.3"/><rect x="3.27" y="6.53" width="2.2" height="2.2" rx="0.3"/><rect x="6.53" y="6.53" width="2.2" height="2.2" rx="0.3"/><rect x="9.8" y="6.53" width="2.2" height="2.2" rx="0.3"/></svg>
    </button>
    <button class="grid-btn" onclick="setGrid(5)" title="5 col" id="gb5">
      <svg viewBox="0 0 12 12"><rect x="0" y="0" width="1.6" height="1.6" rx="0.3"/><rect x="2.6" y="0" width="1.6" height="1.6" rx="0.3"/><rect x="5.2" y="0" width="1.6" height="1.6" rx="0.3"/><rect x="7.8" y="0" width="1.6" height="1.6" rx="0.3"/><rect x="10.4" y="0" width="1.6" height="1.6" rx="0.3"/><rect x="0" y="2.6" width="1.6" height="1.6" rx="0.3"/><rect x="2.6" y="2.6" width="1.6" height="1.6" rx="0.3"/><rect x="5.2" y="2.6" width="1.6" height="1.6" rx="0.3"/><rect x="7.8" y="2.6" width="1.6" height="1.6" rx="0.3"/><rect x="10.4" y="2.6" width="1.6" height="1.6" rx="0.3"/><rect x="0" y="5.2" width="1.6" height="1.6" rx="0.3"/><rect x="2.6" y="5.2" width="1.6" height="1.6" rx="0.3"/><rect x="5.2" y="5.2" width="1.6" height="1.6" rx="0.3"/><rect x="7.8" y="5.2" width="1.6" height="1.6" rx="0.3"/><rect x="10.4" y="5.2" width="1.6" height="1.6" rx="0.3"/></svg>
    </button>
  </div>
</div>

<main>
  <div id="cam-grid" class="g3"></div>
</main>

<!-- MODAL -->
<div class="modal-bg" id="modal-bg" onclick="bgClick(event)">
  <div class="modal">
    <div class="modal-top">
      <div class="modal-title" id="modal-title">—</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-img-wrap">
      <div class="modal-loading" id="modal-loading">
        <div class="loader"></div>
        <span>CARGANDO IMAGEN</span>
      </div>
      <img id="modal-img" src="" alt="" onload="modalImgLoaded()" onerror="modalImgError()">
    </div>
    <div class="modal-bottom">
      <div class="modal-info">
        <div class="modal-cam-name" id="modal-cam-name"></div>
        <div class="modal-meta">
          <span>ID <b id="modal-id"></b></span>
          <span>LAT <b id="modal-lat"></b></span>
          <span>LON <b id="modal-lon"></b></span>
        </div>
      </div>
      <button class="modal-refresh" onclick="modalRefresh()">↻ REFRESH</button>
      <div class="modal-nav">
        <button class="nav-btn" onclick="modalNav(-1)">◀ PREV</button>
        <button class="nav-btn" onclick="modalNav(1)">NEXT ▶</button>
      </div>
    </div>
  </div>
</div>

// Proxy URL — usa tu propio dominio para evitar CORS
function camUrl(id) {
  return `/api/cam?id=${id}&t=${Date.now()}`;
}

let filtered = [...CAMERAS];
let modalIdx = 0;
let autoTimer = null;
let autoOn = false;

// CLOCK
setInterval(() => {
  document.getElementById('clock').textContent =
    new Date().toLocaleTimeString('es-ES', {hour12:false});
}, 1000);
document.getElementById('clock').textContent =
  new Date().toLocaleTimeString('es-ES', {hour12:false});

// RENDER
function render() {
  const grid = document.getElementById('cam-grid');
  grid.innerHTML = '';
  if (!filtered.length) {
    grid.innerHTML = '<div class="empty">[ SIN RESULTADOS ]</div>';
    document.getElementById('count-badge').textContent = `0 / ${CAMERAS.length}`;
    return;
  }
  document.getElementById('count-badge').textContent = `${filtered.length} / ${CAMERAS.length}`;

  filtered.forEach((cam, i) => {
    const card = document.createElement('div');
    card.className = 'cam-card';
    card.style.animationDelay = (i * 0.02) + 's';
    const globalIdx = CAMERAS.indexOf(cam);
    card.innerHTML = `
      <div class="cam-header">
        <div class="cam-id">CAM · ${cam.id}</div>
        <div class="cam-live"><div class="dot"></div>LIVE</div>
      </div>
      <div class="cam-img-wrap" onclick="openModal(${globalIdx})">
        <div class="cam-overlay" id="ov-${cam.id}">
          <div class="loader"></div>
          <span>CONECTANDO</span>
        </div>
        <img
          id="img-${cam.id}"
          src="${camUrl(cam.id)}"
          alt="${cam.nombre}"
          onload="imgOk('${cam.id}')"
          onerror="imgErr('${cam.id}')"
        >
        <div class="cam-corners"></div>
        <div class="cam-ts" id="ts-${cam.id}"></div>
      </div>
      <div class="cam-footer">
        <div class="cam-name" title="${cam.nombre}">${cam.nombre}</div>
        <div class="cam-btns">
          <button class="cam-btn" title="Refrescar" onclick="event.stopPropagation();reloadCard('${cam.id}')">↻</button>
          <a class="cam-btn" href="http://camaras.vigo.org/webcam/camv2.php?id=${cam.id}" target="_blank" title="Fuente" onclick="event.stopPropagation()">↗</a>
        </div>
      </div>
    `;
    grid.appendChild(card);
  });
}

function imgOk(id) {
  const img = document.getElementById('img-' + id);
  const ov  = document.getElementById('ov-' + id);
  const ts  = document.getElementById('ts-' + id);
  if (img) img.classList.add('loaded');
  if (ov)  ov.classList.add('hidden');
  if (ts)  ts.textContent = new Date().toLocaleTimeString('es-ES',{hour12:false});
}

function imgErr(id) {
  const ov = document.getElementById('ov-' + id);
  if (ov) ov.innerHTML = '<span style="color:#ff3355;font-size:8px;letter-spacing:0.15em">SIN SEÑAL</span>';
}

function reloadCard(id) {
  const img = document.getElementById('img-' + id);
  const ov  = document.getElementById('ov-' + id);
  if (!img) return;
  img.classList.remove('loaded');
  ov.classList.remove('hidden');
  ov.innerHTML = '<div class="loader"></div><span>CONECTANDO</span>';
  img.src = camUrl(id);
}

function refreshAll() {
  filtered.forEach(c => reloadCard(c.id));
}

function toggleAuto() {
  autoOn = !autoOn;
  const btn = document.getElementById('auto-btn');
  if (autoOn) {
    btn.textContent = 'AUTO ON';
    btn.classList.add('active');
    autoTimer = setInterval(refreshAll, 7000);
  } else {
    btn.textContent = 'AUTO OFF';
    btn.classList.remove('active');
    clearInterval(autoTimer);
  }
}

function filterCams() {
  const q = document.getElementById('search').value.toLowerCase().trim();
  filtered = q ? CAMERAS.filter(c => c.nombre.toLowerCase().includes(q) || c.id.includes(q)) : [...CAMERAS];
  render();
}

function setGrid(n) {
  document.getElementById('cam-grid').className = 'g' + n;
  [2,3,4,5].forEach(x => document.getElementById('gb'+x).classList.toggle('active', x===n));
}

// ── MODAL ──
function openModal(idx) {
  modalIdx = idx;
  loadModal();
  document.getElementById('modal-bg').classList.add('open');
}

function loadModal() {
  const cam = CAMERAS[modalIdx];
  document.getElementById('modal-title').textContent    = `CAM ${cam.id} — VISTA AMPLIADA`;
  document.getElementById('modal-cam-name').textContent = cam.nombre;
  document.getElementById('modal-id').textContent       = cam.id;
  document.getElementById('modal-lat').textContent      = cam.lat.toFixed(5);
  document.getElementById('modal-lon').textContent      = cam.lon.toFixed(5);

  // Reset loading state
  const mImg  = document.getElementById('modal-img');
  const mLoad = document.getElementById('modal-loading');
  mImg.style.display  = 'none';
  mLoad.classList.remove('hidden');
  mImg.src = '';          // limpia antes
  mImg.src = camUrl(cam.id);
}

function modalImgLoaded() {
  document.getElementById('modal-img').style.display  = 'block';
  document.getElementById('modal-loading').classList.add('hidden');
}

function modalImgError() {
  const mLoad = document.getElementById('modal-loading');
  mLoad.innerHTML = '<span style="color:#ff3355;letter-spacing:0.15em">SIN SEÑAL</span>';
}

function modalRefresh() {
  loadModal();
}

function closeModal() {
  document.getElementById('modal-bg').classList.remove('open');
  document.getElementById('modal-img').src = '';
}

function bgClick(e) {
  if (e.target === document.getElementById('modal-bg')) closeModal();
}

function modalNav(dir) {
  modalIdx = (modalIdx + dir + CAMERAS.length) % CAMERAS.length;
  loadModal();
}

document.addEventListener('keydown', e => {
  if (!document.getElementById('modal-bg').classList.contains('open')) return;
  if (e.key === 'Escape')      closeModal();
  if (e.key === 'ArrowRight')  modalNav(1);
  if (e.key === 'ArrowLeft')   modalNav(-1);
  if (e.key === 'r' || e.key === 'R') modalRefresh();
});

render();
</script>
